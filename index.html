<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ScanMenu — Digital Menu & QR Ordering</title>
    <meta name="description" content="ScanMenu is a digital menu and QR ordering system for restaurants. Scan, order, and pay — all from your phone." />
    <meta property="og:title" content="ScanMenu — Digital Menu & QR Ordering" />
    <meta property="og:description" content="Scan, order, and pay — all from your phone. The modern way to run your restaurant." />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary" />
    <meta name="twitter:title" content="ScanMenu — Digital Menu & QR Ordering" />
    <meta name="twitter:description" content="Scan, order, and pay — all from your phone." />
    <meta name="mobile-web-app-capable" content="yes" />
  </head>
  <body>
    <div id="root">
      <style>
        .scanmenu-loader-container {
          display: flex;
          align-items: center;
          justify-content: center;
          height: 100vh;
          width: 100vw;
          background-color: #f5f5f4; /* stone-50 */
          position: fixed;
          top: 0;
          left: 0;
          z-index: 9999;
          font-family: system-ui, -apple-system, sans-serif;
          flex-direction: column;
          gap: 16px;
        }
        .scanmenu-spinner {
          width: 40px;
          height: 40px;
          border: 3px solid rgba(217, 119, 6, 0.2); /* amber-600 with opacity */
          border-top-color: #d97706; /* amber-600 */
          border-radius: 50%;
          animation: scanmenu-spin 1s linear infinite;
        }
        @keyframes scanmenu-spin {
          to { transform: rotate(360deg); }
        }
        .scanmenu-text {
          color: #78716c; /* stone-500 */
          font-size: 14px;
          font-weight: 600;
          letter-spacing: 0.05em;
          text-transform: uppercase;
          animation: scanmenu-pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }
        @keyframes scanmenu-pulse {
          0%, 100% { opacity: 1; }
          50% { opacity: .5; }
        }
      </style>
      <div class="scanmenu-loader-container">
        <div class="scanmenu-spinner"></div>
        <div class="scanmenu-text">Loading ScanMenu...</div>
      </div>
    </div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
